<style>/* ============================================================
   FAT TAIL ADS — Core tokens
   Colors, type, spacing, radii, shadows.
   ============================================================ */

/* ---------- Fonts (Google Fonts) ---------- */
/* Display serif: Fraunces — variable, warm, strong italic */
/* Text sans:    Inter Tight — neutral, geometric, great at small sizes */
/* Mono:         JetBrains Mono — numerate, slightly humanist */
/* vietnamese */



:root {
  /* ============ COLOR — Paper & Ink ============ */
  /* Warm paper whites (background family) */
  --paper-0:  #FBF8F3;  /* page background — very warm off-white */
  --paper-1:  #F5F1E8;  /* raised surface / sidebar */
  --paper-2:  #EAE4D6;  /* input wells, subtle fills */
  --paper-3:  #D8D0BD;  /* hairlines on warm bg */

  /* Ink (foreground family) */
  --ink-0:    #14120E;  /* headings, primary text */
  --ink-1:    #2A2720;  /* body text */
  --ink-2:    #5C564A;  /* secondary text, labels */
  --ink-3:    #8A8576;  /* tertiary / placeholder */
  --ink-4:    #B5AF9F;  /* disabled */

  /* ============ COLOR — Signal ============ */
  /* Primary accent: Vermillion — warm, decisive, distinctive.
     Used sparingly: the tail in the logomark, key data points,
     primary CTAs, chart highlights. Never as a page flood. */
  --vermillion-50:  #FBEDE5;
  --vermillion-100: #F5D4C2;
  --vermillion-300: #E89169;
  --vermillion-500: #C8502A;  /* brand primary */
  --vermillion-700: #8E3516;
  --vermillion-900: #4A1B0A;

  /* ============ COLOR — Analytical ============ */
  /* Reserved second accent for charts/data ONLY. Deep teal —
     reads as "the other series" against vermillion. */
  --teal-50:  #E3ECEB;
  --teal-300: #6A9694;
  --teal-500: #1F5553;
  --teal-700: #0E3635;

  /* Slate — for quiet data, gridlines on dark contexts */
  --slate-300: #9AA4B0;
  --slate-500: #4A5463;
  --slate-700: #2A323E;

  /* ============ COLOR — Semantic ============ */
  --positive:   #2F6B3C;   /* gains, above-benchmark */
  --positive-bg:#E4EEDD;
  --negative:   #A63434;   /* losses, below-benchmark */
  --negative-bg:#F3DDDB;
  --caution:    #9A6B1A;   /* watchlist */
  --caution-bg: #F4E6C7;

  /* ============ Foreground / Background aliases ============ */
  --bg:        var(--paper-0);
  --bg-raised: var(--paper-1);
  --bg-sunk:   var(--paper-2);

  /* ============ COLOR — Dark mode surfaces ============ */
  /* Warm near-blacks, not cold greys — the dark twin of the paper scale.
     Used for dark sections now; full dark-mode theme later. */
  --surface-0: #14120E;   /* deepest — page background in dark */
  --surface-1: #1C1A15;   /* raised surface / cards */
  --surface-2: #26231C;   /* inputs, wells */
  --surface-3: #322E25;   /* hairlines / borders on dark */

  /* Dark-mode foreground (text on dark surfaces) */
  --on-dark-0: #FBF8F3;   /* primary text on dark */
  --on-dark-1: #D8D0BD;   /* body text on dark */
  --on-dark-2: #A8A192;   /* secondary on dark */
  --on-dark-3: #6E685B;   /* tertiary / disabled on dark */

  /* ============ FOCUS RING ============ */
  /* Keyboard-focus affordance. Vermillion ring + soft halo.
     Apply as: outline: var(--focus-ring); outline-offset: var(--focus-ring-offset); */
  --focus-ring:        2px solid var(--vermillion-500);
  --focus-ring-offset: 2px;
  --focus-halo:        0 0 0 4px var(--vermillion-50);        /* on light surfaces */
  --focus-halo-dark:   0 0 0 4px rgba(200, 80, 42, 0.30);     /* on dark surfaces */

  --fg:        var(--ink-0);
  --fg-body:   var(--ink-1);
  --fg-muted:  var(--ink-2);
  --fg-subtle: var(--ink-3);

  --border:        var(--paper-3);
  --border-strong: var(--ink-3);
  --border-ink:    var(--ink-0);

  --accent:        var(--vermillion-500);
  --accent-hover:  var(--vermillion-700);
  --accent-soft:   var(--vermillion-50);

  /* ============ TYPE — Families ============ */
  --font-display: "Fraunces", "Times New Roman", Georgia, serif;
  --font-sans:    "Inter Tight", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  --font-mono:    "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;

  /* ============ TYPE — Size scale (fluid) ============ */
  --t-mono-xs:   11px;
  --t-xs:        12px;
  --t-sm:        13px;
  --t-base:      15px;
  --t-md:        17px;
  --t-lg:        20px;
  --t-xl:        24px;
  --t-2xl:       32px;
  --t-3xl:       44px;
  --t-4xl:       60px;
  --t-5xl:       80px;
  --t-6xl:      108px;

  /* ============ TYPE — Weights ============ */
  --w-regular:  400;   /* @kind other */
  --w-medium:   500;   /* @kind other */
  --w-semi:     600;   /* @kind other */
  --w-bold:     700;   /* @kind other */

  /* ============ TYPE — Leading ============ */
  --lh-tight:   1.05;  /* @kind other */
  --lh-snug:    1.2;   /* @kind other */
  --lh-normal:  1.45;  /* @kind other */
  --lh-relaxed: 1.6;   /* @kind other */

  /* ============ TYPE — Tracking ============ */
  --tr-tighter: -0.03em;
  --tr-tight:   -0.01em;
  --tr-normal:   0;       /* @kind other */
  --tr-wide:     0.04em;
  --tr-wider:    0.12em;   /* all-caps eyebrows */

  /* ============ SPACING ============ */
  --s-0:  0;       /* @kind spacing */
  --s-1:  4px;
  --s-2:  8px;
  --s-3:  12px;
  --s-4:  16px;
  --s-5:  24px;
  --s-6:  32px;
  --s-7:  48px;
  --s-8:  64px;
  --s-9:  96px;
  --s-10: 128px;

  /* ============ RADII ============ */
  /* Restrained — this is a research firm, not a SaaS. */
  --r-0:   0;      /* @kind radius */
  --r-1:   2px;
  --r-2:   4px;
  --r-3:   8px;
  --r-pill: 999px;

  /* ============ BORDERS ============ */
  --bw-hair:  0.5px;
  --bw-1:     1px;
  --bw-2:     2px;

  /* ============ SHADOWS — soft, paper-like ============ */
  --shadow-0: 0 0 0 0 transparent;
  --shadow-1: 0 1px 0 rgba(20,18,14,0.04), 0 1px 2px rgba(20,18,14,0.06);
  --shadow-2: 0 2px 0 rgba(20,18,14,0.03), 0 4px 10px rgba(20,18,14,0.06);
  --shadow-3: 0 8px 28px -12px rgba(20,18,14,0.22);
  --shadow-inset: inset 0 0 0 1px var(--border);

  /* ============ MOTION ============ */
  --ease-std:  cubic-bezier(0.2, 0.0, 0.0, 1.0);   /* @kind other */
  --ease-out:  cubic-bezier(0.2, 0.8, 0.2, 1.0);   /* @kind other */
  --dur-fast:  120ms;   /* @kind other */
  --dur-med:   200ms;   /* @kind other */
  --dur-slow:  380ms;   /* @kind other */
}

/* ============================================================
   SEMANTIC ELEMENTS — drop-in defaults for HTML
   ============================================================ */
html, body {
  background: var(--bg);
  color: var(--fg-body);
  font-family: var(--font-sans);
  font-size: var(--t-base);
  line-height: var(--lh-normal);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, .h1 {
  font-family: var(--font-display);
  font-weight: var(--w-regular);
  font-size: var(--t-4xl);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tighter);
  color: var(--fg);
  font-variation-settings: "opsz" 120, "SOFT" 30;
}
h2, .h2 {
  font-family: var(--font-display);
  font-weight: var(--w-regular);
  font-size: var(--t-3xl);
  line-height: var(--lh-tight);
  letter-spacing: var(--tr-tighter);
  color: var(--fg);
  font-variation-settings: "opsz" 96;
}
h3, .h3 {
  font-family: var(--font-sans);
  font-weight: var(--w-semi);
  font-size: var(--t-xl);
  line-height: var(--lh-snug);
  letter-spacing: var(--tr-tight);
  color: var(--fg);
}
h4, .h4 {
  font-family: var(--font-sans);
  font-weight: var(--w-semi);
  font-size: var(--t-md);
  line-height: var(--lh-snug);
  color: var(--fg);
}

p { margin: 0 0 1em; max-width: 66ch; }

.eyebrow {
  font-family: var(--font-mono);
  font-size: var(--t-mono-xs);
  font-weight: var(--w-medium);
  letter-spacing: var(--tr-wider);
  text-transform: uppercase;
  color: var(--fg-muted);
}

.lede {
  font-family: var(--font-display);
  font-size: var(--t-lg);
  line-height: var(--lh-normal);
  font-style: italic;
  color: var(--fg-body);
  font-variation-settings: "opsz" 72;
}

code, .mono, .num {
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  font-feature-settings: "zero", "ss01";
}

hr {
  border: 0;
  border-top: var(--bw-hair) solid var(--border);
  margin: var(--s-6) 0;
}

::selection { background: var(--vermillion-100); color: var(--ink-0); }
</style>

<style>
  html,body { margin:0; background: var(--paper-0); }
  #root { min-height: 100vh; }
  a { color: inherit; }
  a:hover { color: var(--ink-0); }

  /* ── Research figure reset ──────────────────────────────
     Research figures are rendered inside article body wrappers
     that set a default paragraph font (Fraunces 19, lh 1.7).
     Figures need their own typographic world — they sit on a
     paper-1 card and use Inter Tight / Fraunces with explicit
     sizes and line-heights. Reset UA margins on headings and
     paragraphs inside any <figure> so the only spacing that
     applies is what the component explicitly declares.        */
  figure h1, figure h2, figure h3, figure h4,
  figure p, figure figcaption, figure ul, figure ol {
    margin: 0;
  }
  figure * { box-sizing: border-box; }
  /* Balance multi-line figure titles so the last line is not a short orphan. */
  figure h3 { text-wrap: balance; }
</style>
</head>
